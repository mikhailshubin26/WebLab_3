{% extends 'base.html' %}

{% block content %}
<h1 class="my-4">Главная страница</h1>

{% if current_user.is_authenticated %}
    <p class="lead">
        Вы вошли в систему как <strong>{{ current_user.login }}</strong>.
    </p>
{% else %}
    <p class="lead">
        Добро пожаловать в приложение. Для доступа к секретной странице выполните вход.
    </p>
{% endif %}
{% endblock %}
